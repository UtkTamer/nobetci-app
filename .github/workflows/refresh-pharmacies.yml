name: Refresh pharmacies

on:
  schedule:
    # 06:00 Europe/Istanbul
    - cron: '0 3 * * *'
    # 18:00 Europe/Istanbul
    - cron: '0 15 * * *'
  workflow_dispatch:

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Validate refresh URL secret
        env:
          BACKEND_REFRESH_URL: ${{ secrets.BACKEND_REFRESH_URL }}
        run: |
          if [ -z "$BACKEND_REFRESH_URL" ]; then
            echo "BACKEND_REFRESH_URL secret is not set."
            exit 1
          fi

      - name: Trigger backend refresh
        env:
          BACKEND_REFRESH_URL: ${{ secrets.BACKEND_REFRESH_URL }}
        run: |
          curl --fail --show-error --silent \
            --max-time 600 \
            --retry 3 \
            --retry-delay 5 \
            "$BACKEND_REFRESH_URL"
