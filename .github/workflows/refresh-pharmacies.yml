name: Refresh pharmacies

on:
  schedule:
    # 06:00 Europe/Istanbul = 03:00 UTC
    - cron: '0 3 * * *'
  workflow_dispatch:
    inputs:
      city_filter:
        description: "Comma separated city slugs (default: ankara)"
        required: false
        default: ankara

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write
  pages: write

jobs:
  refresh-ankara:
    name: Refresh pharmacies
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      CITY_FILTER: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.city_filter || 'ankara' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: scripts/package-lock.json

      - name: Install dependencies
        working-directory: scripts
        run: npm ci

      - name: Restore Playwright browser cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('scripts/package-lock.json') }}
          restore-keys: |
            playwright-${{ runner.os }}-

      - name: Install Playwright browsers
        working-directory: scripts
        run: npx playwright install chromium --with-deps

      - name: Run pharmacy refresh
        working-directory: scripts
        env:
          CITY_FILTER: ${{ env.CITY_FILTER }}
          SKIP_GEOCODE: '1'
        run: node refresh.mjs

      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          IFS=',' read -ra CITY_LIST <<< "${CITY_FILTER}"
          FILES="docs/api/health.json docs/api/cities.json"
          for city in "${CITY_LIST[@]}"; do
            FILES="$FILES docs/api/${city}.json"
          done
          git add $FILES
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: refresh pharmacy data [skip ci]"
            git push
          fi
