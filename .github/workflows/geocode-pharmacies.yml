name: Geocode pharmacies

on:
  schedule:
    # 07:30 Europe/Istanbul = 04:30 UTC
    - cron: '30 4 * * *'
  workflow_dispatch:
    inputs:
      city_filter:
        description: "Comma separated city slugs (default: ankara)"
        required: false
        default: ankara
  workflow_run:
    workflows:
      - Refresh pharmacies
    types:
      - completed

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write

jobs:
  geocode-ankara:
    name: Geocode pharmacies
    runs-on: ubuntu-latest
    if: github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success'
    timeout-minutes: 45
    env:
      CITY_FILTER: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.city_filter || 'ankara' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: scripts/package-lock.json

      - name: Install dependencies
        working-directory: scripts
        run: npm ci

      - name: Run pharmacy geocoding
        working-directory: scripts
        env:
          CITY_FILTER: ${{ env.CITY_FILTER }}
          GEOCODE_ONLY: '1'
        run: node refresh.mjs

      - name: Commit updated coordinates
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          IFS=',' read -ra CITY_LIST <<< "${CITY_FILTER}"
          FILES="docs/api/health.json docs/api/cities.json scripts/geocode-cache.json"
          for city in "${CITY_LIST[@]}"; do
            FILES="$FILES docs/api/${city}.json"
          done
          git add $FILES
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: geocode pharmacy data [skip ci]"
            git push
          fi
