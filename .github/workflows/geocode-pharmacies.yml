name: Geocode pharmacies

on:
  schedule:
    # 07:30 Europe/Istanbul = 04:30 UTC
    - cron: '30 4 * * *'
  workflow_dispatch:
  workflow_run:
    workflows:
      - Refresh pharmacies
    types:
      - completed

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write

jobs:
  geocode-shards:
    name: Geocode shard ${{ matrix.shard.id }}
    runs-on: ubuntu-latest
    if: github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success'
    timeout-minutes: 45
    strategy:
      fail-fast: false
      max-parallel: 2
      matrix:
        shard:
          - id: 1
            cities: adana,adiyaman,afyonkarahisar,agri,amasya,ankara,antalya,artvin,aydin
          - id: 2
            cities: balikesir,bilecik,bingol,bitlis,bolu,burdur,bursa,canakkale,cankiri
          - id: 3
            cities: corum,denizli,diyarbakir,edirne,elazig,erzincan,erzurum,eskisehir,gaziantep
          - id: 4
            cities: giresun,gumushane,hakkari,hatay,isparta,mersin,istanbul,izmir,kars
          - id: 5
            cities: kastamonu,kayseri,kirklareli,kirsehir,kocaeli,konya,kutahya,malatya,manisa
          - id: 6
            cities: kahramanmaras,mardin,mugla,mus,nevsehir,nigde,ordu,rize,sakarya
          - id: 7
            cities: samsun,siirt,sinop,sivas,tekirdag,tokat,trabzon,tunceli,sanliurfa
          - id: 8
            cities: usak,van,yozgat,zonguldak,aksaray,bayburt,karaman,kirikkale,batman
          - id: 9
            cities: sirnak,bartin,ardahan,igdir,yalova,karabuk,kilis,osmaniye,duzce

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Install dependencies
        working-directory: scripts
        run: npm ci

      - name: Run pharmacy geocoding
        working-directory: scripts
        env:
          CITY_FILTER: ${{ matrix.shard.cities }}
          GEOCODE_ONLY: '1'
        run: node refresh.mjs

      - name: Prepare shard artifact
        run: |
          mkdir -p shard-output/docs/api
          mkdir -p shard-output/scripts
          IFS=',' read -ra CITY_LIST <<< "${{ matrix.shard.cities }}"
          for city in "${CITY_LIST[@]}"; do
            cp "docs/api/${city}.json" "shard-output/docs/api/${city}.json"
          done
          cp "docs/api/health.json" "shard-output/docs/api/health.json"
          cp "scripts/geocode-cache.json" "shard-output/scripts/geocode-cache-${{ matrix.shard.id }}.json"

      - name: Upload shard artifact
        uses: actions/upload-artifact@v4
        with:
          name: geocode-shard-${{ matrix.shard.id }}
          path: shard-output
          if-no-files-found: error

  merge-and-commit:
    name: Merge geocode outputs
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: geocode-shards

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Download shard artifacts
        uses: actions/download-artifact@v4
        with:
          path: shard-artifacts

      - name: Merge shard outputs
        run: |
          node - <<'NODE'
          const fs = require('fs');
          const path = require('path');

          const root = process.cwd();
          const artifactRoot = path.join(root, 'shard-artifacts');
          const outputDir = path.join(root, 'docs', 'api');
          const cachePath = path.join(root, 'scripts', 'geocode-cache.json');

          const shardDirs = fs.readdirSync(artifactRoot)
            .map((name) => path.join(artifactRoot, name))
            .filter((fullPath) => fs.statSync(fullPath).isDirectory());

          const mergedHealthCities = [];
          const mergedCache = {};

          for (const shardDir of shardDirs) {
            const docsDir = path.join(shardDir, 'docs', 'api');
            if (fs.existsSync(docsDir)) {
              const files = fs.readdirSync(docsDir);
              for (const file of files) {
                const source = path.join(docsDir, file);
                if (file === 'health.json') {
                  const parsed = JSON.parse(fs.readFileSync(source, 'utf8'));
                  mergedHealthCities.push(...parsed.cities);
                  continue;
                }

                if (file.endsWith('.json')) {
                  const target = path.join(outputDir, file);
                  fs.copyFileSync(source, target);
                }
              }
            }

            const scriptsDir = path.join(shardDir, 'scripts');
            if (fs.existsSync(scriptsDir)) {
              const cacheFiles = fs.readdirSync(scriptsDir)
                .filter((file) => file.startsWith('geocode-cache-') && file.endsWith('.json'));

              for (const file of cacheFiles) {
                Object.assign(
                  mergedCache,
                  JSON.parse(fs.readFileSync(path.join(scriptsDir, file), 'utf8')),
                );
              }
            }
          }

          mergedHealthCities.sort((left, right) =>
            left.cityDisplayName.localeCompare(right.cityDisplayName, 'tr'),
          );

          const health = {
            ok: mergedHealthCities.every((city) => !city.error),
            checkedAt: new Date().toISOString(),
            cities: mergedHealthCities,
          };

          fs.writeFileSync(
            path.join(outputDir, 'health.json'),
            `${JSON.stringify(health, null, 2)}\n`,
          );

          fs.writeFileSync(
            cachePath,
            `${JSON.stringify(mergedCache, null, 2)}\n`,
          );
          NODE

      - name: Commit updated coordinates
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/api/ scripts/geocode-cache.json
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: geocode pharmacy data [skip ci]"
            git push
          fi
